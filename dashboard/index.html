              "@type": "Answer",
              "text": "ChatGPT Ads (also called OpenAI Ads) are sponsored messages that appear inside ChatGPT conversations. When a user asks ChatGPT a question related to a product, service, or topic, an advertiser's message may appear alongside the AI's response. These ads are triggered by context hints — semantic descriptions of the situations where an ad may be useful."

            "name": "How do ChatGPT Ads work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ChatGPT Ads match on the meaning and intent behind a conversation rather than exact keywords. Advertisers define context hints that describe the situations where their ad is relevant. When a user's conversation matches those hints, the ad appears alongside ChatGPT's response. This makes ChatGPT advertising fundamentally different from traditional search ads."
            }
          },
          {
            "@type": "Question",
            "name": "Who is advertising on ChatGPT?",
